version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: playto_payout
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    environment:
      DB_NAME: playto_payout
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery_worker:
    build: ./backend
    command: celery -A config worker --loglevel=info
    environment:
      DB_NAME: playto_payout
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery_beat:
    build: ./backend
    command: celery -A config beat --loglevel=info
    environment:
      DB_NAME: playto_payout
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1

volumes:
  pgdata: